version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "io.trino:trino-spi"
        versions: [">=440"]
      - dependency-name: "io.airlift:slice"
        versions: [">=2.3"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
